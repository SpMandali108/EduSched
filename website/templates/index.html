<!DOCTYPE html>
<html>
<head>
    <title>College Resource Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/index.css') }}">
</head>
<body>

<div class="container">

    <h1>🎓 College Resource Dashboard</h1>

    <!-- Filters -->
    <div class="filters">
        <select id="department"></select>
        <select id="course"></select>
        <select id="semester"></select>
    </div>

    <!-- Info Cards -->
    <div class="cards">
        <div class="card">
            <h3 id="totalDiv">0</h3>
            <p>Divisions</p>
        </div>
        <div class="card">
            <h3 id="totalStudents">0</h3>
            <p>Total Students</p>
        </div>
        <div class="card warning">
            <h3 id="missing">0</h3>
            <p>Missing Data</p>
        </div>
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Division</th>
                    <th>Students</th>
                </tr>
            </thead>
            <tbody id="divisionsTable"></tbody>
        </table>
    </div>

</div>

<script src="{{ url_for('static', filename='JS/index.js') }}"></script>
</body>
</html>
